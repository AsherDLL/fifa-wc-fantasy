[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "fifa-fantasy"
version = "0.0.1"
description = "FIFA Fantasy World Cup 2026 — prediction, optimization, and live decision support."
requires-python = ">=3.12"
authors = [{ name = "predator" }]

[project.optional-dependencies]
dev = ["pytest>=8"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "-ra"
